<!DOCTYPE html>
<html>
<head>
    <title>class fee</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: rgb(0, 255, 128);
        }

        h2 {
            color: rgb(250, 250, 250);
            font-size: 36px;
        }

        h3 {
            color: rgb(2, 120, 255);
            font-size: 25px;
            font-family: 'Courier New', Courier, monospace;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 35px;
            font-family: 'Courier New', Courier, monospace;
            border: 3px solid rgb(0, 0, 0);
        }

        button {
            padding: 10px 20px;
            background: rgb(255, 3, 3);
            color: white;
            border: px solid black;
            border-radius: 35px;
        }

        table {
            margin: 20px auto;
            border-collapse:separate;
            background: rgb(255, 255, 255);
        }

        th, td {
            padding: 10px 20px;
            border: 1px solid rgb(0, 0, 0);
        }

        th {
            background: #ffffff;
            color: rgb(0, 0, 0);
            
        }
    </style>
</head>
<body>

    <h2>SMART</h2>
    <h3>Computer Education</h3>

    <!-- Input Fields -->
    <input type="number" id="no" placeholder="No">
    <input type="text" id="name" placeholder="Name">
    <input type="date" id="date">
    <input type="number" id="fees" placeholder="Fees">

    <br><br>

    <button onclick="addData()">Add Data</button>

    <!-- Table -->
    <table id="table">
        <tr>
            <th>No</th>
            <th>Name</th>
            <th>Date</th>
            <th>Class Fees</th>
        </tr>
    </table>

    <script>
        function addData() {
            let no = document.getElementById("no").value;
            let name = document.getElementById("name").value;
            let date = document.getElementById("date").value;
            let fees = document.getElementById("fees").value;

            if(no === "" || name === "" || date === "" || fees === "") {
                alert("Please fill all fields!");
                return;
            }

            let table = document.getElementById("table");
            let row = table.insertRow();

            row.insertCell(0).innerHTML = no;
            row.insertCell(1).innerHTML = name;
            row.insertCell(2).innerHTML = date;
            row.insertCell(3).innerHTML = fees;

            // Clear inputs
            document.getElementById("no").value = "";
            document.getElementById("name").value = "";
            document.getElementById("date").value = "";
            document.getElementById("fees").value = "";
        }

        document.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                addData();
            }
        });
    </script>

</body>
</html>
